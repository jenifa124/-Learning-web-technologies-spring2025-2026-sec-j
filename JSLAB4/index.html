<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Management Page</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2 class="title">Product Management Page</h2>

<div class="product">

<h3>Product 1</h3>
<p>Unit Price: <span>1000</span></p>

<label>Quantity</label>
<input type="number" class="qty" data-price="1000" min="0" value="">

<label>Total Price</label>
<input type="text" class="total" readonly value="0">

</div>


<div class="product">

<h3>Product 2</h3>
<p>Unit Price: <span>500</span></p>

<label>Quantity</label>
<input type="number" class="qty" data-price="500" min="0" value="">

<label>Total Price</label>
<input type="text" class="total" readonly value="0">

</div>


<div class="product">

<h3>Product 3</h3>
<p>Unit Price: <span>200</span></p>

<label>Quantity</label>
<input type="number" class="qty" data-price="200" min="0" value="">

<label>Total Price</label>
<input type="text" class="total" readonly value="0">

</div>


<script src="script.js"></script>

</body>
</html>
